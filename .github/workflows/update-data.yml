name: Update Capital Data

on:
  schedule:
    - cron: '0 6 * * *'  # Every day at 6:00 AM UTC
  workflow_dispatch:  # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install exa-py python-dotenv requests

      - name: Run pipeline
        env:
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
        run: python -m pipeline.runner

      - name: Copy data to static
        run: cp data/*.json static/data/

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ static/data/
          git diff --staged --quiet || (git commit -m "Update data $(date -u +%Y-%m-%d)" && git push)
